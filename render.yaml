# Render Blueprint for the AnnotateX backend.
# Deploy: push to GitHub, then in Render choose "New +" -> "Blueprint" and point
# it at this repo. Fill in the values marked `sync: false` in the dashboard.
services:
  - type: web
    name: annotatex-backend
    runtime: python
    plan: free
    region: oregon
    branch: main
    buildCommand: "./build.sh"
    startCommand: "uv run gunicorn --chdir backend config.wsgi:application --bind 0.0.0.0:$PORT"
    healthCheckPath: /admin/login/
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.7"
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      # Supabase Postgres connection string (Project Settings -> Database).
      - key: DATABASE_URL
        sync: false
      # Cloudinary credentials (Cloudinary dashboard).
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      # Comma-separated list of frontend origins allowed to call the API.
      - key: CORS_ALLOWED_ORIGINS
        sync: false
